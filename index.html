<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYTUBE - 성수동 핫플 정복!</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* [1] 랜딩 페이지 스타일 (검정 바탕 & image_4) */
        #landing-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background-color: #000; /* 검정 바탕색 */
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; /* 최상단 배치 */
            color: #fff; text-align: center; padding: 20px;
            transition: opacity 0.5s ease;
        }
        /* 미모티콘 이미지 (파일명 image_4 적용) */
        .landing-img { 
            width: 250px; height: auto; margin-bottom: 30px; 
            display: block; 
        }
        /* 안내 문구 (요청하신 위치에 줄바꿈 적용) */
        .landing-msg {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 18px; line-height: 1.8; max-width: 600px;
            margin-bottom: 40px; font-weight: 400; color: #ffffff;
        }
        /* 시작 버튼 (밝은 파란색 둥근 사각형) */
        .btn-start {
            background-color: #00a2ff; color: #fff; border: none; padding: 16px 60px;
            font-size: 18px; font-weight: 700; border-radius: 50px;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,162,255,0.4);
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn-start:hover { transform: scale(1.05); background-color: #008be2; }

        /* [2] 본래 유튜브 스타일 리셋 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Roboto', 'Noto Sans KR', sans-serif; background-color: #fff; color: #0f0f0f; overflow-x: hidden; display: flex; }

        .icon { width: 24px; height: 24px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .icon svg { width: 100%; height: 100%; fill: currentColor; }

        /* 상단 바 (Header) */
        .header { position: fixed; top: 0; left: 0; width: 100%; height: 56px; background-color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid #e5e5e5; z-index: 1000; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .menu-icon { margin-left: -4px; cursor: pointer; background: none; border: none; padding: 8px; border-radius: 50%; }
        .logo-container { display: flex; align-items: center; gap: 4px; text-decoration: none; color: inherit; }
        .logo-play-button { width: 30px; height: 20px; background-color: #0f0f0f; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        .logo-play-button::after { content: ""; border-top: 5px solid transparent; border-left: 10px solid #fff; border-bottom: 5px solid transparent; }
        .logo-text { font-family: 'Roboto', sans-serif; font-size: 20px; font-weight: 700; color: #0f0f0f; letter-spacing: -0.5px; }

        .header-center { display: flex; align-items: center; gap: 8px; flex: 0 1 732px; justify-content: center; }
        .search-form { display: flex; align-items: center; border: 1px solid #ccc; border-radius: 40px; overflow: hidden; height: 40px; flex: 1; max-width: 600px; }
        .search-input { border: none; padding: 0 16px; font-size: 16px; flex: 1; outline: none; }
        .search-icon-btn { width: 64px; height: 100%; border: none; background-color: #f8f8f8; border-left: 1px solid #ccc; cursor: pointer; color: #0f0f0f; }

        .header-right { display: flex; align-items: center; gap: 12px; }
        .create-icon-btn { display: flex; align-items: center; gap: 8px; border: 1px solid #ccc; border-radius: 20px; padding: 6px 14px; background: none; cursor: pointer; font-size: 14px; font-weight: 500; background-color: #f2f2f2;}
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; object-fit: cover; }
        .menu-icon-mobile { display: none; cursor: pointer; background: none; border: none; padding: 8px; border-radius: 50%; }

        /* 사이드바 */
        .sidebar { position: fixed; top: 56px; left: 0; width: 240px; height: calc(100vh - 56px); background-color: #fff; display: flex; flex-direction: column; padding: 12px 12px 0; overflow-y: auto; z-index: 999; border-right: 1px solid #e5e5e5; }
        .sidebar-item { display: flex; align-items: center; gap: 24px; padding: 10px 12px; cursor: pointer; border-radius: 10px; text-decoration: none; color: inherit; margin-bottom: 2px; }
        .sidebar-item.active { background-color: #f2f2f2; font-weight: 500; }
        .sidebar-text { font-size: 14px; color: #0f0f0f; }

        /* 메인 콘텐츠 */
        .main-content { margin-left: 240px; padding-top: 56px; flex: 1; min-height: 100vh; background-color: #fff; width: 100%; }
        .category-chips { display: flex; gap: 12px; padding: 12px 24px; overflow-x: auto; white-space: nowrap; background-color: #fff; position: sticky; top: 56px; z-index: 998; }
        .chip { background-color: rgba(0,0,0,0.05); border: none; padding: 8px 12px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
        .chip.active { background-color: #0f0f0f; color: #fff; }

        /* 비디오 그리드 */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px 16px; padding: 24px; }
        .video-card { display: flex; flex-direction: column; cursor: pointer; text-decoration: none; color: inherit; width: 100%; }
        .thumbnail-container { position: relative; width: 100%; padding-top: 56.25%; border-radius: 12px; overflow: hidden; background-color: #e5e5e5; }
        .thumbnail-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .duration-badge { position: absolute; bottom: 8px; right: 8px; background-color: rgba(0, 0, 0, 0.8); color: #fff; padding: 3px 4px; border-radius: 4px; font-size: 12px; font-weight: 500; }

        .info-container { display: flex; margin-top: 12px; gap: 12px; }
        .channel-avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; object-fit: cover; }
        .video-title { font-size: 16px; font-weight: 600; line-height: 1.4; color: #0f0f0f; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
        .channel-name, .video-meta { font-size: 14px; color: #606060; }

        /* 반응형 모바일 */
        @media (max-width: 768px) {
            .header-center { display: none; }
            .create-icon-btn, .menu-icon { display: none; }
            .menu-icon-mobile { display: block; }
            .main-content { margin-left: 0; }
            .sidebar { transform: translateX(-100%); transition: transform 0.3s; }
            .sidebar.open { transform: translateX(0); }
        }
    </style>

        <img src="./image_4.png" alt="성수동 가이드" class="landing-img">

                </button>
            </div>
        </header>

    <script>
        // 랜딩 페이지에서 시작 버튼을 누를 때 실행되는 로직
        function startExperiment() {
            const overlay = document.getElementById('landing-overlay');
            const mainApp = document.getElementById('main-app');
            
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                mainApp.style.display = 'flex'; // 본래 페이지 노출
                window.scrollTo(0, 0);
            }, 500);
        }

        // 본래 페이지 사이드바 토글 스크립트
        const sidebar = document.getElementById('sidebarMenu');
        const toggleBtnPC = document.getElementById('menuToggleBtnPC');
        const toggleBtnMobile = document.getElementById('menuToggleBtnMobile');

        function toggleSidebar() { sidebar.classList.toggle('open'); }
        if(toggleBtnPC) toggleBtnPC.addEventListener('click', toggleSidebar);
        if(toggleBtnMobile) toggleBtnMobile.addEventListener('click', toggleSidebar);
    </script>
